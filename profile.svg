<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      .profile-bg { fill: #f0f0f0; }
      .profile-circle { fill: #e0e0e0; }
      .profile-text { font-family: Arial, sans-serif; font-size: 24px; fill: #333; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" class="profile-bg"/>
  
  <!-- Profile circle -->
  <circle cx="100" cy="100" r="90" class="profile-circle"/>
  
  <!-- Placeholder text -->
  <text x="100" y="110" class="profile-text">Profile</text>
</svg>